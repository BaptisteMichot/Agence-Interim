spring.application.name=agence-interim
# Charge le .env qu'il soit lancé depuis backend/ (CLI Maven) ou depuis la racine du dépôt (Run de l'IDE).
spring.config.import=optional:file:.env[.properties],optional:file:backend/.env[.properties]

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update

security.jwt.secret=${JWT_SECRET}
security.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:60}

# Upload du CV : PDF, 5 Mo max (limite un peu au-dessus pour laisser un message metier propre).
spring.servlet.multipart.max-file-size=6MB
spring.servlet.multipart.max-request-size=7MB
app.cv.storage-dir=${CV_STORAGE_DIR:uploads/cv}

# Compte administrateur amorce au demarrage s'il n'existe pas (laisser vide pour ne pas en creer).
app.admin.email=${ADMIN_EMAIL:}
app.admin.password=${ADMIN_PASSWORD:}
