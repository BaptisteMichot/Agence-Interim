spring.application.name=agence-interim
# Charge le .env qu'il soit lancé depuis backend/ (CLI Maven) ou depuis la racine du dépôt (Run de l'IDE).
spring.config.import=optional:file:.env[.properties],optional:file:backend/.env[.properties]

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update

security.jwt.secret=${JWT_SECRET}
security.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:60}
